server:
  port: 8080

spring:
  application:
    name: knowledge-assistant-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

# Mock values for external configurations to prevent boot/API errors
supabase:
  url: https://mock.supabase.co
  publishable-key: mock-publishable-key
  secret-key: mock-secret-key
  jwks-url: https://mock.supabase.co/auth/v1/.well-known/jwks.json

app:
  jwt:
    secret: 4b7a2d3e8f1c5a9d6e0b3f7c2a8d1e4f5b9c0a3d6e7f8a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5
    expiration-ms: 86400000

gemini:
  api:
    key: mock-gemini-key
    model: gemini-3.1-flash-lite
    url: https://generativelanguage.googleapis.com/v1beta/models
